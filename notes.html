<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Daily Notes - Placement OS</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="motion.css">
    <link rel="stylesheet" href="abyss.css">
</head>
<body>
<div class="container main-with-nav">
    <header class="page-hero page-hero--animate" data-parallax="0.08">
        <div class="page-hero__glow" aria-hidden="true"></div>
        <p class="page-hero__eyebrow">Reflect</p>
        <h1 class="page-hero__title">
            <span class="page-hero__line"><span class="page-hero__line-inner">Daily notes</span></span>
        </h1>
        <p class="page-hero__lede">A lightweight journal tied to calendar days: wins, blockers, and what to revisit tomorrow. Stored per user on the server.</p>
    </header>

    <section class="data-panel" data-reveal>
        <div class="data-panel__head">
            <div>
                <div class="data-panel__eyebrow">Entry</div>
                <h2 class="data-panel__title">Write &amp; save</h2>
                <p class="data-panel__meta">Choose any date to review past sessions or plan ahead. Load pulls the saved markdown-style text for that day.</p>
            </div>
            <div class="data-panel__actions">
                <button id="loadBtn" type="button">Load</button>
                <button id="saveBtn" type="button">Save notes</button>
            </div>
        </div>
        <div class="data-panel__body">
            <div class="panel-toolbar" style="margin-bottom: 16px;">
                <label>
                    Date
                    <input id="datePicker" type="date">
                </label>
            </div>
            <textarea id="notesArea" class="notes-editor" placeholder="What did you learn? What felt hard? What will you do first tomorrow?"></textarea>
        </div>
    </section>

    <div class="page-actions" data-reveal>
        <button type="button" onclick="window.location.href='index.html'">Home</button>
        <button type="button" onclick="window.location.href='ai.html'">AI help</button>
    </div>
</div>

<script src="theme.js"></script>
<script src="api.js"></script>
<script src="auth.js"></script>
<script>
    requireAuth();
    window.__SHELL_ACTIVE__ = "notes";
</script>
<script src="ui.js"></script>
<script src="abyss-ui.js"></script>
<script src="shell.js"></script>
<script src="motion.js"></script>
<script src="abyss-fx.js"></script>
<script>
    function getISODate(d) {
        const date = d instanceof Date ? d : new Date(d);
        const yyyy = date.getFullYear();
        const mm = String(date.getMonth() + 1).padStart(2, "0");
        const dd = String(date.getDate()).padStart(2, "0");
        return `${yyyy}-${mm}-${dd}`;
    }

    const datePicker = document.getElementById("datePicker");
    const loadBtn = document.getElementById("loadBtn");
    const saveBtn = document.getElementById("saveBtn");
    const notesArea = document.getElementById("notesArea");

    const todayISO = getISODate(new Date());
    datePicker.value = todayISO;

    async function loadNotes(dateISO) {
        const res = await apiFetch(`/api/notes?date=${encodeURIComponent(dateISO)}`);
        notesArea.value = res.content || "";
    }

    loadBtn.addEventListener("click", () => {
        loadNotes(datePicker.value || todayISO).catch((err) => alert(err.message || "Failed to load notes."));
    });

    saveBtn.addEventListener("click", async () => {
        const dateISO = datePicker.value || todayISO;
        const content = notesArea.value || "";
        await apiFetch("/api/notes", {
            method: "POST",
            body: JSON.stringify({ date: dateISO, content }),
        });
        alert("Notes saved.");
    });

    loadNotes(todayISO).catch((err) => alert(err.message || "Failed to load notes."));
</script>
</body>
</html>
